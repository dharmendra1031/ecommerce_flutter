name: westore
description: WeStore E-commerce Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & Network
  dio: ^5.4.0
  
  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  
  # Navigation
  go_router: ^14.0.0
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  
  # Images
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.0
  image_picker: ^1.0.0
  
  # UI
  shimmer: ^3.0.0
  flutter_svg: ^2.0.0
  badges: ^3.0.0
  smooth_page_indicator: ^1.1.0
  pinput: ^3.0.0
  google_fonts: ^6.0.0
  
  # Internationalization & Formatting
  intl: any
  
  # Info
  package_info_plus: ^8.0.0
  
  # Sharing
  share_plus: ^10.0.0
  
  # URL Launcher
  url_launcher: ^6.2.0
  
  # Utilities
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  equatable: ^2.0.0
  dartz: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  go_router_builder: ^2.5.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
